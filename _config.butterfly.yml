# ======================================
# Hexo Butterfly 主题配置文件
# ======================================
# 文档：https://butterfly.js.org/
# 英文文档：https://butterfly.js.org/en/
# ======================================

# --------------------------------------
# 导航栏设置
# --------------------------------------

nav:
  logo:                               # 导航栏 logo 图片（空则不显示）
  display_title: true                 # 是否显示站点标题
  fixed: false                        # 导航栏是否固定在顶部

# 导航菜单
# 格式：菜单名：链接 || 图标 || 显示方式
menu:
  首页：/ || fas fa-home
  归档：/archives/ || fas fa-archive
  标签：/tags/ || fas fa-tags
  分类：/categories/ || fas fa-folder-open
  列表 || fa fa-list || hide:         # hide 表示隐藏一级菜单，显示子菜单
    音乐：/music/ || fas fa-music
    照片：/picture/ || fas fa-images
    电影：/movies/ || fas fa-video
  留言板：/comments/ || fas fa-envelope-open
  友链：/link/ || fas fa-link
  关于：/about/ || fas fa-heart

# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  theme: light                        # 代码块主题：darker / pale night / light / ocean / false
  macStyle: false                     # Mac 风格窗口（红黄绿三个点）
  height_limit: false                 # 代码块高度限制（单位：px，false=不限制）
  word_wrap: false                    # 代码自动换行

  # 工具栏按钮
  copy: true                          # 显示复制按钮
  language: true                      # 显示编程语言标签
  shrink: false                       # 代码块折叠：true=默认折叠 / false=默认展开 / none=展开并隐藏按钮
  fullpage: false                     # 全屏按钮

# 自定义代码高亮配置（覆盖上面的 code_blocks.theme）
highlight_theme: mac                  # 代码主题：darker / pale night / light / ocean / mac / mac light / false
highlight_copy: true                  # 复制按钮
highlight_lang: false                 # 是否显示代码语言
highlight_shrink: true                # 代码块默认折叠：true=不展开 / false=展开 / none=展开并隐藏按钮
highlight_height_limit: false         # 代码块高度限制（单位：px）
code_word_wrap: true                  # 代码自动换行，关闭滚动条

# --------------------------------------
# 社交链接（侧边栏显示）
# --------------------------------------
social:
  fas fa-book: https://blog.csdn.net/m0_74123949 || CSDN || '#d81e06'     # CSDN 博客
  fas fa-code-branch: https://gitee.com/Ywj-ee || Gitee || '#C71D23'      # Gitee 仓库

# --------------------------------------
# 灯笼装饰
# --------------------------------------
lantern:
  enable: false                       # 是否启用（建议只在过年期间开启）

# --------------------------------------
# 图片设置
# --------------------------------------

favicon: /img/favicon.png             # 网站图标（favicon）

avatar:
  img: /img/butterfly-icon.png        # 头像图片
  effect: false                       # 头像旋转动画

# 顶部背景图配置
disable_top_img: false                # 是否禁用所有顶部背景图
default_top_img: rgba(0, 0, 0, 0)     # 默认顶部背景图（页面未指定时显示）
index_img:                            # 首页顶部背景图
archive_img:                          # 归档页顶部背景图
tag_img:                              # 标签页顶部背景图
tag_per_img:                          # 每个标签的独立背景图
category_img:                         # 分类页顶部背景图
category_per_img:                     # 每个分类的独立背景图

footer_img: false                     # 页脚背景图
background: /img/【哲风壁纸】海边 - 自然 - 风景.png  # 网站背景（可以是颜色或图片 URL）

# 封面图片配置
cover:
  index_enable: true                  # 首页文章显示封面
  aside_enable: true                  # 侧边栏显示封面
  archives_enable: true               # 归档页显示封面
  default_cover:                      # 默认封面图（当文章未设置封面时）
    - "/img/default-cover.jpg"

# 替换破损图片
error_img:
  flink: /img/friend_404.gif          # 友链页面图片加载失败时显示
  post_page: /img/404.jpg             # 文章页图片加载失败时显示

# 404 页面
error_404:
  enable: true                        # 启用 404 页面
  subtitle: "Page Not Found"          # 副标题
  background: /img/error-page.png     # 背景图片

# 文章信息配置（显示在文章顶部）
post_meta:
  page:                               # 首页文章信息
    date_type: created                # 日期类型：created（创建时间）/ updated（更新时间）/ both（两者）
    date_format: date                 # 日期格式：date（日期）/ relative（相对时间）
    categories: true                  # 显示分类
    tags: false                       # 显示标签
    label: true                       # 显示标签文字（如"分类："）
  post:                               # 文章页信息
    position: left                    # 位置：left（左）/ center（居中）
    date_type: both                   # 日期类型
    date_format: date                 # 日期格式
    categories: true                  # 显示分类
    tags: true                        # 显示标签
    label: true                       # 显示标签文字

# --------------------------------------
# 首页设置
# --------------------------------------

index_site_info_top:                  # 首页站点信息位置（如 300px/10%）
index_top_img_height:                 # 首页顶部图片高度（如 300px）

# 首页副标题
subtitle:
  enable: true                        # 启用副标题
  effect: true                        # 打字机效果
  loop: true                          # 循环播放
  source: false                       # 从文件获取（false=使用下方 sub 配置）
  sub:                                # 副标题内容（多条轮播）
    - Dare to dream Live to shine! 🌟💫
    - Time flows gently Cherish each moment! ⏳🍃

# 首页文章布局
# 1: 封面在左，信息在右
# 2: 封面在右，信息在左
# 3: 封面和信息左右交替
# 4: 封面在上，信息在下
# 5: 信息显示在封面上
# 6: 瀑布流 - 封面在上，信息在下
# 7: 瀑布流 - 信息显示在封面上
index_layout: 3

# 首页显示文章摘要
# 1: description（仅 front-matter 中的 description）
# 2: both（有 description 则显示，否则自动摘要）
# 3: auto_excerpt（自动摘要，默认）
# false: 不显示摘要
index_post_content:
  method: 3                           # 摘要获取方式
  length: 500                         # 摘要长度（当 method 为 2 或 3 时）

# --------------------------------------
# 文章设置
# --------------------------------------

# 文章目录
toc:
  post: true                          # 文章显示目录
  page: false                         # 页面显示目录
  number: true                        # 显示序号
  expand: false                       # 是否全部展开
  style_simple: false                 # 简洁模式（仅文章）
  scroll_percent: true                # 显示阅读进度百分比

# 版权声明
post_copyright:
  enable: true                        # 启用版权声明
  decode: false                       # 是否加密（防复制）
  author_href:                        # 作者链接（空则不显示）
  license: CC BY-NC-SA 4.0            # 许可协议
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏功能
reward:
  enable: false                       # 启用打赏
  text:                               # 打赏按钮文字
  QR_code:                            # 收款码
    # - img: /img/wechat.jpg
    #   link:
    #   text: wechat
    # - img: /img/alipay.jpg
    #   link:
    #   text: alipay

# 在线编辑（方便直接修改博客源码）
post_edit:
  enable: false                       # 启用在线编辑
  # url: https://github.com/用户名/仓库名/edit/分支名/source/
  url:

# 相关文章
related_post:
  enable: true                        # 启用相关文章
  limit: 6                            # 显示数量
  date_type: created                  # 排序依据：created（创建时间）/ updated（更新时间）

# 文章分页导航
# 1: 下一篇指向旧文章
# 2: 下一篇指向新文章
# false: 禁用分页
post_pagination: 1

# 过时文章提醒
noticeOutdate:
  enable: false                       # 启用过时提醒
  style: flat                         # 样式：simple / flat
  limit_day: 365                      # 超过多少天显示提醒
  position: top                       # 位置：top（顶部）/ bottom（底部）
  message_prev: It has been           # 提醒文字（前）
  message_next: days since the last update, the content of the article may be outdated.

# --------------------------------------
# 页脚设置
# --------------------------------------
footer:
  owner:
    enable: true                      # 显示站长信息
    since: 2024                       # 博客成立年份
  copyright: flase                    # 显示 Copyright 信息

# --------------------------------------
# 侧边栏设置
# --------------------------------------

aside:
  enable: true                        # 启用侧边栏
  hide: false                         # 默认隐藏
  button: true                        # 显示隐藏/显示按钮（右下角）
  mobile: true                        # 移动端显示
  position: right                     # 位置：left / right

  display:
    archive: true                     # 归档页显示侧边栏
    tag: true                         # 标签页显示侧边栏
    category: true                    # 分类页显示侧边栏

  card_author:                        # 作者卡片
    enable: true
    description:                      # 个人描述
    button:
      enable: true                    # 显示"关注我"按钮
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/Ywj-ch

  card_announcement:                  # 公告卡片
    enable: true                      # 启用公告
    content: 欢迎来到我的博客！         # 公告内容

  card_recent_post:                   # 最新文章
    enable: true
    limit: 5                          # 显示数量（0=显示全部）
    sort: date                        # 排序：date / updated
    sort_order:

  card_newest_comments:               # 最新评论
    enable: false
    sort_order:
    limit: 6                          # 显示数量
    storage: 10                       # 缓存时间（分钟）
    avatar: true                      # 显示头像

  card_categories:                    # 分类卡片
    enable: false
    limit: 8                          # 显示数量
    expand: none                      # 是否展开：none / true / false
    sort_order:

  card_tags:                          # 标签云
    enable: false
    limit: 40                         # 显示数量
    color: false                      # 随机颜色
    orderby: random                   # 排序：random（随机）/ name（名称）/ length（长度）
    order: 1                          # 顺序：1（升序）/ -1（降序）
    sort_order:

  card_archives:                      # 归档卡片
    enable: false
    type: monthly                     # 类型：monthly（按月）/ yearly（按年）
    format: MMMM YYYY                 # 日期格式（如：2025 年 3 月）
    order: -1                         # 排序：-1（降序）/ 1（升序）
    limit: 8                          # 显示数量
    sort_order:

  card_post_series:                   # 文章系列
    enable: true
    series_title: false               # 显示系列标题
    orderBy: "date"                   # 排序：title（标题）/ date（日期）
    order: -1                         # 顺序：-1（降序）/ 1（升序）

  card_webinfo:                       # 网站信息
    enable: true
    post_count: true                  # 显示文章总数
    last_push_date: true              # 最后更新时间
    sort_order:
    runtime_date:                     # 网站运行时间

# --------------------------------------
# 右下角按钮
# --------------------------------------

rightside_bottom:                     # 右下角按钮距离底部的距离（默认单位：px）

# 简繁转换
translate:
  enable: false                       # 启用简繁转换
  default: 繁                         # 按钮文字
  defaultEncoding: 2                  # 默认语言：1（繁体）/ 2（简体）
  translateDelay: 0                   # 转换延迟
  msgToTraditionalChinese: "繁"       # 简体模式下的按钮文字
  msgToSimplifiedChinese: "簡"        # 繁体模式下的按钮文字

# 阅读模式
readmode: true                        # 启用阅读模式

# 深色模式
darkmode:
  enable: true                        # 启用深色模式
  button: true                        # 显示切换按钮
  autoChangeMode: 2                   # 自动切换：1（跟随系统）/ 2（18 点 - 次日 6 点）/ false（手动）
  start:                              # 开始时间（不设置则默认 18 点）
  end:                                # 结束时间（不设置则默认 6 点）

# 返回顶部按钮显示滚动百分比
rightside_scroll_percent: false

# 右下角按钮顺序
# 可选：readmode, translate, darkmode, hideAside, toc, chat, comment
rightside_item_order:
  enable: false                       # 启用自定义顺序
  hide:                               # 隐藏的按钮
  show:                               # 显示的按钮

# --------------------------------------
# 全局设置
# --------------------------------------

anchor:
  auto_update: false                  # 滚动时自动更新 URL（根据标题锚点）
  click_to_scroll: false              # 点击标题滚动到对应位置

photofigcaption: false                # 图片说明

copy:
  enable: true                        # 启用复制功能
  copyright:
    enable: false                     # 复制后添加版权信息
    limit_count: 150                  # 字数限制

# 字数统计（需要安装 hexo-wordcount 插件）
wordcount:
  enable: true                        # 启用字数统计
  post_wordcount: true                # 显示文章字数
  min2read: true                      # 显示阅读时间
  total_wordcount: true               # 显示全站总字数（侧边栏）

# 不蒜子访问量统计
busuanzi:
  site_uv: true                       # 显示独立访客数
  site_pv: true                       # 显示总访问量
  page_pv: true                       # 显示页面访问量

# --------------------------------------
# 数学公式
# --------------------------------------

math:
  use:                                # 数学公式引擎：mathjax / katex（留空则不启用）
  per_page: true                      # 每页都加载（false=仅在 front-matter 中设置的页面加载）
  hide_scrollbar: false               # 隐藏滚动条

  mathjax:
    enableMenu: true                  # 启用右键菜单
    tags: none                        # 公式编号：all / ams / none

  katex:
    copy_tex: false                   # 启用复制公式

# --------------------------------------
# 搜索
# --------------------------------------

search:
  use: local_search                   # 搜索类型：algolia_search / local_search / docsearch
  placeholder: "Search for Posts"     # 搜索框占位符

  # Algolia 搜索
  algolia_search:
    enable: false
    hitsPerPage: 6                    # 每页显示数量

  # 本地搜索
  local_search:
    enable: true
    labels:
      input_placeholder: "Search for Posts"
      hits_empty: "We didn't find any results for the search: ${query}"

  # Docsearch
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# 分享系统
# --------------------------------------

share:
  use: sharejs                        # 分享系统：sharejs / addtoany

  # Share.js
  sharejs:
    sites: facebook,twitter,wechat,weibo,qq  # 启用的分享平台

  # AddToAny
  addtoany:
    item: facebook,twitter,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统
# --------------------------------------

comments:
  use:                                # 评论系统：Disqus / Livere / Gitalk / Valine / Waline / Utterances 等
  text: true                          # 在按钮旁显示评论系统名称
  lazyload: false                     # 懒加载（进入可视区域才加载）
  count: false                        # 在首页显示评论数
  card_post_count: false              # 在侧边栏显示评论数

# 以下为各评论系统的具体配置
disqus:
  shortname:
  apikey:

disqusjs:
  shortname:
  apikey:
  option:

livere:
  uid:

gitalk:
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

valine:
  appId:
  appKey:
  avatar: monsterid
  serverURLs:
  bg:
  visitor: false
  option:

waline:
  serverURL:
  bg:
  pageview: false
  option:

utterances:
  repo:
