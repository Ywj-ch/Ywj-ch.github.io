# ======================================
# Hexo 站点配置文件
# ======================================
# 文档：https://hexo.io/docs/configuration.html
# 源码：https://github.com/hexojs/hexo/
# ======================================

# --------------------------------------
# 站点信息
# --------------------------------------
title: 爱吃薯片的熊猫の技术小站          # 网站标题
subtitle: "记录学习与成长"              # 网站副标题
description: "Dream big Work hard Stay focused"  # 网站描述（用于 SEO）
keywords:                               # 网站关键词（用于 SEO），多个用逗号分隔
author: 爱吃薯片的熊猫                  # 作者名
language:                               # 语言
  - zh-CN                               # 简体中文
  - en                                  # 英文
timezone: ""                            # 时区（空则使用系统时区）

# --------------------------------------
# URL 配置
# --------------------------------------
url: https://chippanda.top/             # 网站域名，用于生成绝对链接
permalink: :year/:month/:day/:title/    # 文章永久链接格式
                                          # 可用变量：:year, :month, :day, :title 等
permalink_defaults:                     # 永久链接默认值
pretty_urls:
  trailing_index: true                  # 是否保留 index.html（false 则移除）
  trailing_html: true                   # 是否保留 .html 后缀（false 则移除）

# --------------------------------------
# 目录配置
# --------------------------------------
source_dir: source                      # 源文件目录（存放文章、页面等）
public_dir: public                      # 生成的网站目录（部署时用的）
tag_dir: tags                           # 标签目录名
archive_dir: archives                   # 归档目录名
category_dir: categories                # 分类目录名
code_dir: downloads/code                # 代码下载目录
i18n_dir: :lang                         # 多语言目录
skip_render:                            # 跳过渲染的文件/目录（正则或路径）

# --------------------------------------
# 文章配置
# --------------------------------------
new_post_name: :title.md                # 新建文章的文件名格式
default_layout: post                    # 默认文章类型（post/page/draft）
titlecase: false                        # 是否将标题转换为标题大小写
external_link:
  enable: true                          # 是否在新标签页打开外部链接
  field: site                           # 应用范围：site（全站）/ post（仅文章）
  exclude: ""                           # 排除的域名（多个用逗号分隔）
filename_case: 0                        # 文件名大小写转换（0=不转换，1=转小写，2=转大写）
render_drafts: false                    # 是否渲染草稿
post_asset_folder: false                # 是否为每篇文章创建独立资源文件夹
relative_link: false                    # 是否使用相对链接（推荐 false）
future: true                            # 是否显示未来日期的文章
syntax_highlighter: highlight.js        # 语法高亮器：highlight.js / prismjs

# 代码高亮配置（Highlight.js）
highlight:
  enable: false                         # 禁用 Hexo 默认高亮（使用主题配置）
  line_number: false                    # 显示行号
  auto_detect: false                    # 自动检测语言
  tab_replace: ""                       # Tab 替换为空格
  wrap: true                            # 是否换行
  hljs: false                           # 使用 hljs 样式

# 代码高亮配置（PrismJS）
prismjs:
  preprocess: true                      # 预处理
  line_number: true                     # 显示行号
  tab_replace: ""                       # Tab 替换

# --------------------------------------
# 首页配置
# --------------------------------------
index_generator:
  path: ""                              # 首页路径（空则为根目录）
  per_page: 10                          # 每页显示的文章数（0=禁用分页）
  order_by: -date                       # 排序方式（-date=日期倒序，date=正序）

# --------------------------------------
# 分类与标签
# --------------------------------------
default_category: uncategorized         # 默认分类（当文章未指定分类时）
category_map:                           # 分类别名映射
tag_map:                                # 标签别名映射

# --------------------------------------
# Meta 信息
# --------------------------------------
meta_generator: true                    # 是否生成 Meta Generator 标签

# --------------------------------------
# 日期和时间格式
# --------------------------------------
date_format: YYYY-MM-DD                 # 日期格式
time_format: HH:mm:ss                   # 时间格式
updated_option: "mtime"                 # 更新时间获取方式
                                          # mtime=文件修改时间，date=使用 date 字段，empty=不显示

# --------------------------------------
# 分页配置
# --------------------------------------
per_page: 6                             # 每页显示的文章数（0=禁用分页）
pagination_dir: page                    # 分页目录名

# --------------------------------------
# 包含/排除文件
# --------------------------------------
include:                                # 包含的文件（默认包含所有）
exclude:                                # 排除的文件（不渲染）
ignore:                                 # 忽略的文件

# --------------------------------------
# 扩展配置
# --------------------------------------
theme: butterfly                        # 使用的主题

# --------------------------------------
# 部署配置
# --------------------------------------
deploy:
  type: git                             # 部署方式
  repo: git@github.com:Ywj-ch/Ywj-ch.github.io.git  # GitHub 仓库地址
  branch: main                          # 部署分支

# --------------------------------------
# 图片懒加载
# --------------------------------------
lazyload:
  enable: true                          # 启用图片懒加载
  loadingImg: /img/loading.gif          # 加载中显示的图片

# --------------------------------------
# Live2D 看板娘
# --------------------------------------
live2d:
  enable: false                         # 是否启用看板娘
  scriptFrom: local                     # 脚本来源：local（本地）
  pluginRootPath: live2dw/              # 插件根目录（相对路径）
  pluginJsPath: lib/                    # JS 文件目录
  pluginModelPath: assets/              # 模型文件目录
  tagMode: false                        # 标签模式（false=插入到所有页面）
  debug: false                          # 调试模式（输出日志）
  model:
    use: live2d-widget-model-koharu     # 模型名称（小喵）
  display:
    position: left                      # 位置：left / right
    width: 150                          # 宽度（像素）
    height: 300                         # 高度（像素）
  mobile:
    show: false                         # 手机端是否显示

# --------------------------------------
# 信封评论区
# --------------------------------------
envelope_comment:
  enable: true                          # 启用信封评论区
  custom_pic:
    cover: https://npm.elemecdn.com/hexo-butterfly-envelope/lib/violet.jpg  # 信笺头部图片
    line: https://npm.elemecdn.com/hexo-butterfly-envelope/lib/line.png     # 信笺底部图片
    beforeimg: https://npm.elemecdn.com/hexo-butterfly-envelope/lib/before.png  # 信封前半部分
    afterimg: https://npm.elemecdn.com/hexo-butterfly-envelope/lib/after.png    # 信封后半部分
  message:                              # 信笺正文（多行文本）
    - 有什么想问的？
    - 有什么想说的？
    - 有什么想吐槽的？
    - 哪怕是有什么想吃的，都可以告诉我哦~
  bottom: 自动书记人偶竭诚为您服务！     # 底部文字（仅支持单行）
  path: comments                        # 评论区路径
  front_matter:
    title: 留言板                       # 留言板标题
    comments: true                      # 启用评论

# --------------------------------------
# 文章分类磁贴
# --------------------------------------
magnet:
  enable: true                          # 启用分类磁贴
  priority: 1                           # 优先级（数字越小越优先）
  enable_page: /                        # 启用的页面
  type: categories                      # 类型：categories / tags
  devide: 2                             # 分隔数
  display:
    - name: 学习笔记                    # 分类名
      display_name: 爱吃薯片的熊猫の学习笔记
      icon: 📚                           # 图标
    - name: 生活趣闻
      display_name: 爱吃薯片的熊猫の生活趣闻
      icon: 🐱‍👓
    - name: 个人项目
      display_name: 爱吃薯片的熊猫の个人项目
      icon: 👩‍💻
    - name: 算法学习
      display_name: 爱吃薯片的熊猫の算法学习
      icon: 💡
  color_setting:
    text_color: black                   # 文字颜色
    text_hover_color: white             # 悬停文字颜色
    background_color: "#f2f2f2"         # 背景颜色
    background_hover_color: "#69e8f2"   # 悬停背景颜色
  layout:
    type: id                            # 布局类型
    name: recent-posts                  # 布局名称
    index: 0                            # 索引位置
  temple_html: '<div class="recent-post-item" style="width:100%;height: auto"><div id="catalog_magnet">${temple_html_item}</div></div>'
  plus_style: ""                        # 额外样式

# --------------------------------------
# 首页轮播图（置顶文章）
# --------------------------------------
swiper:
  enable: true                          # 启用轮播图
  priority: 5                           # 优先级
  enable_page: /                        # 启用的页面
  timemode: date                        # 排序方式：date（创建时间）/ updated（更新时间）
  layout:
    type: id                            # 布局类型
    name: recent-posts                  # 布局名称
    index: 0                            # 索引位置
  default_descr: 再怎么看我也不知道怎么描述它的啦！  # 默认描述
  swiper_css: https://npm.elemecdn.com/hexo-butterfly-swiper/lib/swiper.min.css
  swiper_js: https://npm.elemecdn.com/hexo-butterfly-swiper/lib/swiper.min.js
  custom_css: https://npm.elemecdn.com/hexo-butterfly-swiper/lib/swiperstyle.css
  custom_js: https://npm.elemecdn.com/hexo-butterfly-swiper/lib/swiper_init.js

# --------------------------------------
# 动画效果
# --------------------------------------
wowjs:
  enable: true                          # 启用动画
  priority: 10                          # 优先级
  mobile: false                         # 移动端是否启用（默认禁用）
  animateitem:
    - class: recent-post-item           # 文章卡片
      style: animate__fadeInDown        # 动画名称
      duration: 2s                      # 持续时间
      delay: 1s                         # 延迟时间
      offset: 100                       # 触发距离
      iteration: 2                      # 重复次数
    - class: card-widget                # 小部件
      style: animate__zoomIn
  animate_css: https://npm.elemecdn.com/hexo-butterfly-wowjs/lib/animate.min.css
  wow_js: https://npm.elemecdn.com/hexo-butterfly-wowjs/lib/wow.min.js
  wow_init_js: https://npm.elemecdn.com/hexo-butterfly-wowjs/lib/wow_init.js

# --------------------------------------
# 文章加密
# --------------------------------------
encrypt:
  abstract: 有东西被加密了，请输入密码查看.
  message: 您好，这里需要密码.
  tags:
    - { name: tagName, password: 密码 A }   # 标签加密
    - { name: tagName, password: 密码 B }
  theme: xray                             # 加密主题
  wrong_pass_message: 抱歉，这个密码看着不太对，请再试试.
  wrong_hash_message: 抱歉，这个文章不能被校验，不过您还是能看看解密后的内容.
